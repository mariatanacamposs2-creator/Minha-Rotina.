 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Rotina</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4345/4345517.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4345/4345517.png">

    <style>
        :root {
            --pink-light: #fff0f3;
            --pink-medium: #ff85a1;
            --pink-dark: #f06292;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--pink-light); 
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }
        .container { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.15); 
            width: 100%; max-width: 450px; 
        }
        h2 { text-align: center; color: var(--pink-dark); margin-bottom: 5px; }
        .date-display { text-align: center; font-size: 0.9em; color: var(--pink-medium); margin-bottom: 20px; }
        .item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #fff5f7; }
        .time { font-weight: bold; color: var(--pink-medium); width: 65px; font-size: 0.9em; }
        .task-text { flex-grow: 1; margin-left: 10px; font-size: 1em; color: #4a4a4a; }
        .checkbox-custom { width: 22px; height: 22px; accent-color: var(--pink-dark); cursor: pointer; }
        .done { text-decoration: line-through; color: #ccc; }
        .footer { text-align: center; font-size: 0.8em; margin-top: 20px; color: var(--pink-medium); }
    </style>
</head>
<body>

<div class="container">
    <h2>🌸 Minha Rotina</h2>
    <p id="data-hoje" class="date-display"></p>
    <div id="lista"></div>
    <div class="footer">Reseta automaticamente à meia-noite!</div>
</div>

<script>
    const rotina = [
        { h: "06:00", t: "Oração + Leitura Bíblica" },
        { h: "06:19", t: "500ml de Água" },
        { h: "06:20", t: "Caminhada" },
        { h: "07:10", t: "Skin Care" },
        { h: "07:20", t: "Tomar Café" },
        { h: "08:00", t: "Arrumar a Casa" },
        { h: "12:00", t: "Almoço" },
        { h: "13:00", t: "Soneca" },
        { h: "14:00", t: "Estudo" },
        { h: "15:00", t: "Hobby / Algo novo" },
        { h: "16:00", t: "Lanche" },
        { h: "18:00", t: "Fazer Janta" },
        { h: "19:00", t: "Arrumar / Igreja" },
        { h: "Livre", t: "Celular (10 min por vez)" }
    ];

    function verificarNovoDia() {
        const hoje = new Date().toLocaleDateString();
        if (localStorage.getItem('ultima_data') !== hoje) {
            rotina.forEach((_, i) => localStorage.removeItem(`check-${i}`));
            localStorage.setItem('ultima_data', hoje);
        }
        document.getElementById('data-hoje').innerText = hoje;
    }

    function renderizar() {
        const listaEl = document.getElementById('lista');
        listaEl.innerHTML = '';
        rotina.forEach((item, index) => {
            const finalizada = localStorage.getItem(`check-${index}`) === 'true';
            listaEl.innerHTML += `
                <div class="item">
                    <span class="time">${item.h}</span>
                    <span class="task-text ${finalizada ? 'done' : ''}">${item.t}</span>
                    <input type="checkbox" class="checkbox-custom" ${finalizada ? 'checked' : ''} onclick="toggle(${index})">
                </div>`;
        });
    }

    function toggle(index) {
        const status = localStorage.getItem(`check-${index}`) === 'true';
        localStorage.setItem(`check-${index}`, !status);
        renderizar();
    }

    verificarNovoDia();
    renderizar();
</script>
</body>
</html>
